version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: prometheon-redis
    restart: unless-stopped
    network_mode: host

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prometheon-backend
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prometheon-celery-worker
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app worker --loglevel=info

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prometheon-celery-beat
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app beat --loglevel=info

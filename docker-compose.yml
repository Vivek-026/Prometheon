version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: prometheon-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: prometheon
      POSTGRES_PASSWORD: prometheon_secret
      POSTGRES_DB: prometheon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prometheon"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: prometheon-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prometheon-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://prometheon:prometheon_secret@postgres:5432/prometheon
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      S3_BUCKET_NAME: prometheon-docs
      S3_REGION: ap-south-1
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prometheon-celery-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://prometheon:prometheon_secret@postgres:5432/prometheon
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prometheon-celery-beat
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://prometheon:prometheon_secret@postgres:5432/prometheon
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app beat --loglevel=info

volumes:
  pgdata:
